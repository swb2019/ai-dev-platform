apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ai-dev-platform
  labels:
    app.kubernetes.io/name: ai-dev-platform
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-dev-platform
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-dev-platform
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: web-runtime
      containers:
        - name: web
          image: REPLACE_ME_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-runtime
  namespace: ai-dev-platform
