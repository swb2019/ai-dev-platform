name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"

jobs:
  security_scans:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade semgrep

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.28.0"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact

      - name: Run Semgrep
        run: semgrep --config=auto --error --verbose .

  quality_and_build:
    name: Quality Checks and Build
    runs-on: ubuntu-latest
    needs: security_scans
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

  supply_chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    needs: quality_and_build
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_REF: ghcr.io/${{ github.repository_owner }}/ai-dev-platform-web:${{ github.sha }}
      LOCAL_TAG: ai-dev-platform/web:ci
      SBOM_PATH: artifacts/sbom-web-cyclonedx.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure artifacts directory
        run: mkdir -p artifacts

      - name: Install supply chain tooling
        run: bash ./scripts/container/install-tools.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        run: docker build -f apps/web/Dockerfile -t $LOCAL_TAG -t $IMAGE_REF .

      - name: Run Trivy scan
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignorefile .trivyignore $LOCAL_TAG

      - name: Run Grype scan
        run: grype $LOCAL_TAG --fail-on High --config .grype.yaml

      - name: Generate SBOM (Syft)
        run: syft $LOCAL_TAG -o cyclonedx-json > $SBOM_PATH

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container image
        run: docker push $IMAGE_REF

      - name: Cosign keyless signature
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          cosign sign --keyless --yes $IMAGE_REF

      - name: Cosign SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign attest --keyless --yes --predicate $SBOM_PATH --type cyclonedx $IMAGE_REF

      - name: Sign SBOM artifact
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign-blob $SBOM_PATH --output-signature ${SBOM_PATH}.sig --output-certificate ${SBOM_PATH}.cert --yes

      - name: Upload supply chain artifacts
        uses: actions/upload-artifact@v3
        with:
          name: supply-chain-artifacts
          path: |
            ${{ env.SBOM_PATH }}
            ${{ env.SBOM_PATH }}.sig
            ${{ env.SBOM_PATH }}.cert
